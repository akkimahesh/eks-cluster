apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
 name: my-eks-cluster
 region: us-east-1
managedNodeGroups:
 - name: nodegroup-name
   instanceTypes: ["c3.large","c4.large","c5.large","c5d.large","c5n.large","c5a.large"]
   desiredCapacity: 2
   volumeSize: 20
   spot: true
   ssh:
     allow: true # Enables SSH access using default key (~/.ssh/id_rsa.pub)